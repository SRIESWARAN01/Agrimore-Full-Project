name: agrimore_services
description: Services package for Agrimore - Contains Firebase services, API clients, and business logic services shared across all apps.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Internal package dependency
  agrimore_core:
    path: ../agrimore_core
  
  # Firebase Services
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.3
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  
  # AI/ML
  google_generative_ai: ^0.4.7
  
  # Networking
  http: ^1.2.2
  dio: ^5.7.0
  connectivity_plus: ^6.1.1
  
  # Authentication
  google_sign_in: ^6.2.1
  
  # Local Storage
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Location Services
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  location: ^7.0.0
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  
  # Deep Linking
  app_links: ^6.3.2
  
  # Utilities
  path_provider: ^2.1.4
  device_info_plus: ^10.1.2
  logger: ^2.4.0
  
  # Payment
  razorpay_flutter: ^1.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
