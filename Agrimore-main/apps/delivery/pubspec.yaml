name: delivery
description: "Agrimore Delivery Partner App - Real-time order delivery management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  
  # Shared Packages
  agrimore_core:
    path: ../../packages/agrimore_core
  agrimore_ui:
    path: ../../packages/agrimore_ui
  agrimore_services:
    path: ../../packages/agrimore_services
  
  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  firebase_messaging: ^15.1.6
  
  # State Management
  provider: ^6.1.2
  
  # Location
  geolocator: ^13.0.2
  google_maps_flutter: ^2.10.0
  geocoding: ^3.0.0
  
  # Utilities
  shared_preferences: ^2.3.4
  url_launcher: ^6.3.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  firebase_storage: ^12.3.7
  
  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/delivery_logo.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
