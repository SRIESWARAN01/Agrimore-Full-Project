name: agrimore_admin
description: Agrimore Admin Panel - Administrative dashboard for managing the marketplace
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  flutter_web_plugins:
    sdk: flutter

  # Internal packages
  agrimore_core:
    path: ../../packages/agrimore_core
  agrimore_services:
    path: ../../packages/agrimore_services
  agrimore_ui:
    path: ../../packages/agrimore_ui

  # State Management
  provider: ^6.1.2

  # Routing
  go_router: ^14.6.2

  # Firebase (already in services, but needed for options)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.4
  cloud_functions: ^5.6.2

  # Animation
  flutter_animate: ^4.5.0

  # Authentication
  google_sign_in: ^6.2.1

  # Charts & Analytics
  fl_chart: ^0.69.2

  # Image Handling
  image_picker: ^1.1.2
  image_picker_web: ^4.0.0
  image_cropper: ^8.0.2

  # PDF & Export
  pdf: ^3.11.1
  printing: ^5.13.3

  # URL Launcher
  url_launcher: ^6.3.1

  # Date/Time
  timeago: ^3.7.0

  # Utilities
  package_info_plus: ^8.1.2
  uuid: ^4.5.1

  # UI Components
  flutter_typeahead: ^5.2.0
  timeline_tile: ^2.0.0
  
  # Local Storage
  shared_preferences: ^2.3.2

  # Localization
  easy_localization: ^3.0.7
  file_picker: ^10.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/NotoSans-Regular.ttf

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
          weight: 400

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/admin_logo.png"
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icons/admin_logo.png"
  remove_alpha_ios: true
