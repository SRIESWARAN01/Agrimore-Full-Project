name: agrimore_marketplace
description: Agrimore Marketplace - Customer-facing agricultural e-commerce application
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  flutter_web_plugins:
    sdk: flutter

  # Internal packages
  agrimore_core:
    path: ../../packages/agrimore_core
  agrimore_services:
    path: ../../packages/agrimore_services
  agrimore_ui:
    path: ../../packages/agrimore_ui

  # State Management
  provider: ^6.1.2
  flutter_hooks: ^0.20.5

  # Firebase (already in services, but needed for options)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # Authentication
  google_sign_in: ^6.2.1

  # Permissions
  permission_handler: ^11.3.1

  # Payment Gateway
  razorpay_flutter: ^1.3.7
  android_intent_plus: ^5.0.2
  url_launcher: ^6.3.1
  http: ^1.2.0
  cloud_functions: ^5.6.2
  web: ^1.1.0

  # Maps & Location
  google_maps_flutter: ^2.9.0
  google_maps_flutter_web: ^0.5.10
  google_maps_flutter_platform_interface: ^2.9.0

  # AI
  google_generative_ai: ^0.4.7

  # Image Handling
  image_picker: ^1.1.2
  image_picker_web: ^4.0.0

  # Sharing
  share_plus: ^10.1.2

  # Date/Time
  timeago: ^3.7.0

  # UI Components
  confetti: ^0.7.0
  flutter_markdown: ^0.7.1
  timeline_tile: ^2.0.0

  # Audio Recording
  record: ^6.0.0
  audioplayers: ^6.0.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/NotoSans-Regular.ttf
    - assets/map_styles/dark_map.json
    - assets/map_styles/light_map.json

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
          weight: 400

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  remove_alpha_ios: true

  geolocator: ^13.0.2
  geocoding: ^3.0.0
